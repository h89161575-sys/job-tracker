name: Track Jobs

on:
  schedule:
    - cron: '7/15 * * * *'
  workflow_dispatch:
    inputs:
      test_discord:
        description: 'Send a Discord test notification instead of running the tracker'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/**'

concurrency:
  group: job-tracker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Verify job tracker
        run: python src/verify_job_tracker.py
      - name: Run job tracker
        id: tracker
        continue-on-error: true
        if: ${{ github.event.inputs.test_discord != 'true' }}
        env:
          JOB_DISCORD_WEBHOOK_URL: ${{ secrets.JOB_DISCORD_WEBHOOK_URL }}
          SPARKASSE_JOBLIST_AUTHORIZATION: ${{ secrets.SPARKASSE_JOBLIST_AUTHORIZATION }}
          JOB_TRACKER_SOURCES: jusjobs,erste_bank,uniqa,lawfinder,derstandard,karriere_at,stepstone
        run: python src/job_tracker.py
      - name: Send Discord test notification
        if: ${{ github.event.inputs.test_discord == 'true' }}
        env:
          JOB_DISCORD_WEBHOOK_URL: ${{ secrets.JOB_DISCORD_WEBHOOK_URL }}
        run: python src/job_tracker.py --test-notify
      - name: Commit snapshot updates
        if: ${{ always() && github.event.inputs.test_discord != 'true' }}
        run: |
          if [ -n "$(git status --porcelain data/snapshots)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/snapshots
            git commit -m "Update job tracker snapshots"
            git push
          else
            echo "No snapshot changes."
          fi
      - name: Fail when the tracker is unhealthy
        if: ${{ always() && github.event.inputs.test_discord != 'true' && steps.tracker.outcome == 'failure' }}
        run: exit 1
